<div class="p-6 min-h-screen bg-[var(--color-bg-primary)] text-white font-['Inter']">
  <div class="max-w-6xl mx-auto space-y-6">
    <div class="flex justify-between items-center bg-white/5 border border-white/10 rounded-xl p-6 backdrop-blur-md">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight font-['Outfit'] text-white">Grupos de Trabalho</h1>
        <p class="text-xs text-[var(--color-text-secondary)] mt-2 uppercase tracking-wider">
          Gerencie seus grupos, timezones e agendamentos.
        </p>
      </div>
      <button routerLink="/lider/grupos/novo" class="px-4 py-2.5 bg-[var(--color-accent-brand)] hover:opacity-90 text-white rounded-lg text-sm font-semibold transition-all shadow-md shadow-indigo-500/20 cursor-pointer">
        + Novo Grupo
      </button>
    </div>

    <div *ngIf="loading()" class="py-12 flex justify-center items-center text-gray-400">
      <span>Carregando grupos...</span>
    </div>

    <div *ngIf="!loading() && groups().length === 0" class="py-16 text-center text-gray-400 border border-dashed border-white/10 rounded-lg">
      <p class="font-semibold text-white">Nenhum grupo cadastrado</p>
    </div>

    <div *ngIf="!loading() && groups().length > 0" class="overflow-x-auto">
      <table class="w-full text-left border-collapse text-sm">
        <thead>
          <tr class="border-b border-white/10 text-gray-400 font-medium">
            <th class="py-3 px-4">Nome do Grupo</th>
            <th class="py-3 px-4">Fuso Horário</th>
            <th class="py-3 px-4">ID da Empresa</th>
            <th class="py-3 px-4">ID do Projeto</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-white/5">
          <tr *ngFor="let g of groups()" class="hover:bg-white/5 transition-colors">
            <td class="py-3 px-4 font-semibold text-white">{{ g.name }}</td>
            <td class="py-3 px-4 text-gray-300 font-medium">{{ g.timezone }}</td>
            <td class="py-3 px-4 text-gray-300">{{ g.clientCompanyId }}</td>
            <td class="py-3 px-4 text-gray-300">{{ g.projectId }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
