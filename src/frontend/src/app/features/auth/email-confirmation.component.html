<div class="flex items-center justify-center min-h-screen bg-[var(--color-bg-primary)] text-white px-4">
  <div class="p-8 border border-white/10 rounded-xl bg-[var(--color-bg-secondary)] shadow-2xl w-full max-w-md backdrop-blur-md text-center">
    
    <h2 class="text-2xl font-bold mb-6 text-[var(--color-accent-brand)]">
      Confirmação de E-mail
    </h2>

    <!-- Loading State -->
    <div *ngIf="loading()" class="py-8 space-y-4">
      <svg class="animate-spin h-10 w-10 text-[var(--color-accent-brand)] mx-auto" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="text-gray-400">Verificando seus dados de ativação...</p>
    </div>

    <!-- Success State -->
    <div *ngIf="!loading() && success()" class="py-6 space-y-6">
      <div class="h-16 w-16 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-emerald-500/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="space-y-2">
        <p class="text-lg font-bold text-white">E-mail verificado com sucesso!</p>
        <p class="text-sm text-gray-400">Sua conta foi ativada. Você já pode acessar a plataforma utilizando suas credenciais.</p>
      </div>
      <button routerLink="/login" class="w-full py-2.5 bg-[var(--color-accent-brand)] hover:opacity-90 text-white font-semibold rounded-lg text-sm transition-all shadow-md shadow-emerald-500/20">
        Ir para o Login
      </button>
    </div>

    <!-- Error State -->
    <div *ngIf="!loading() && error()" class="py-6 space-y-6">
      <div class="h-16 w-16 bg-red-500/10 border border-red-500/20 text-red-400 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-red-500/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <div class="space-y-2">
        <p class="text-lg font-bold text-white">Falha na ativação</p>
        <p class="text-sm text-red-300">{{ error() }}</p>
      </div>
      <button routerLink="/login" class="w-full py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-semibold rounded-lg text-sm transition-colors">
        Voltar para o Login
      </button>
    </div>

  </div>
</div>
