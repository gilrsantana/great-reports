<div class="flex h-screen bg-[var(--color-bg-primary)] overflow-hidden font-['Inter']">
  <!-- Sidebar -->
  <aside class="w-64 bg-[var(--color-bg-secondary)] border-r border-[var(--color-border-glass)] flex flex-col">
    <div class="p-6 border-b border-[var(--color-border-glass)] flex items-center gap-2">
      <span class="text-xl font-bold tracking-tight text-white font-['Outfit']">Great Reports</span>
      <span class="text-[10px] px-1.5 py-0.5 bg-[var(--color-accent-brand)] text-white rounded font-semibold">ADMIN</span>
    </div>
    
    <!-- Navigation Links -->
    <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto">
      <a routerLink="/admin" routerLinkActive="bg-white/5 text-white border-white/10" [routerLinkActiveOptions]="{exact: true}" class="flex items-center px-4 py-2.5 text-sm font-medium border border-transparent text-[var(--color-text-secondary)] hover:text-white hover:bg-white/5 rounded-lg transition-colors">
        Painel
      </a>
      <a routerLink="/admin/usuarios" routerLinkActive="bg-white/5 text-white border-white/10" class="flex items-center px-4 py-2.5 text-sm font-medium border border-transparent text-[var(--color-text-secondary)] hover:text-white hover:bg-white/5 rounded-lg transition-colors">
        Usuários
      </a>
      <a routerLink="/admin/clientes" routerLinkActive="bg-white/5 text-white border-white/10" class="flex items-center px-4 py-2.5 text-sm font-medium border border-transparent text-[var(--color-text-secondary)] hover:text-white hover:bg-white/5 rounded-lg transition-colors">
        Clientes
      </a>
      <a routerLink="/admin/projetos" routerLinkActive="bg-white/5 text-white border-white/10" class="flex items-center px-4 py-2.5 text-sm font-medium border border-transparent text-[var(--color-text-secondary)] hover:text-white hover:bg-white/5 rounded-lg transition-colors">
        Projetos
      </a>
      <a routerLink="/admin/logs-email" routerLinkActive="bg-white/5 text-white border-white/10" class="flex items-center px-4 py-2.5 text-sm font-medium border border-transparent text-[var(--color-text-secondary)] hover:text-white hover:bg-white/5 rounded-lg transition-colors">
        Auditoria de E-mail
      </a>
    </nav>

    <!-- Sidebar Footer / User Profile & Logout -->
    <div class="p-4 border-t border-[var(--color-border-glass)] bg-white/[0.02]">
      <div class="flex flex-col gap-2">
        <div class="flex flex-col min-w-0">
          <span class="text-xs font-semibold text-white truncate">{{ email }}</span>
          <span class="text-[10px] text-[var(--color-text-dim)] uppercase">Administrador</span>
        </div>
        <button (click)="logout()" class="w-full flex items-center justify-center gap-2 px-3 py-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-xs font-semibold border border-red-500/20 transition-colors cursor-pointer">
          Sair
        </button>
      </div>
    </div>
  </aside>

  <!-- Content Container -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 border-b border-[var(--color-border-glass)] bg-[var(--color-bg-secondary)]/50 backdrop-blur-md flex items-center justify-between px-8">
      <span class="text-sm font-semibold text-[var(--color-text-secondary)]">Painel Administrativo</span>
      <div class="flex items-center gap-4">
        <!-- Optional notifications or widgets -->
      </div>
    </header>

    <!-- Main Content View -->
    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
